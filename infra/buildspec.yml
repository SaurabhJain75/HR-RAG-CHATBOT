# ══════════════════════════════════════════════════════════════════════════════
# buildspec.yml
# AWS CodeBuild CI/CD pipeline
#
# Pipeline flow:
#   GitHub push → CodeBuild trigger → build Docker image
#   → push to ECR → update ECS service → rolling deploy
#
# Required CodeBuild environment variables (set in AWS console):
#   AWS_ACCOUNT_ID   → your 12-digit AWS account ID
#   AWS_REGION       → e.g. ap-south-1
#   ECR_REPO_NAME    → hr-rag-chatbot
#   ECS_CLUSTER      → hr-rag-cluster
#   ECS_SERVICE_API  → hr-rag-api-service
#   ECS_SERVICE_UI   → hr-rag-streamlit-service
# ══════════════════════════════════════════════════════════════════════════════

version: 0.2

env:
  variables:
    IMAGE_TAG:       "latest"
    CONTAINER_NAME:  "hr-rag-api"

phases:

  # ── Phase 1: Install tools ──────────────────────────────────────────────────
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - pip install --quiet awscli

  # ── Phase 2: Pre-build — login to ECR ──────────────────────────────────────
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_REGION |
          docker login --username AWS --password-stdin
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      # Build a unique image tag from the git commit SHA for traceability
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:-latest}
      - ECR_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME

      - echo "ECR URI       - $ECR_URI"
      - echo "Image tag     - $IMAGE_TAG"

  # ── Phase 3: Build Docker image ─────────────────────────────────────────────
  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t $ECR_REPO_NAME:$IMAGE_TAG .
      - docker tag $ECR_REPO_NAME:$IMAGE_TAG $ECR_URI:$IMAGE_TAG
      - docker tag $ECR_REPO_NAME:$IMAGE_TAG $ECR_URI:latest
      - echo "Build complete."

  # ── Phase 4: Push to ECR + deploy to ECS ───────────────────────────────────
  post_build:
    commands:
      - echo "Pushing image to ECR..."
      - docker push $ECR_URI:$IMAGE_TAG
      - docker push $ECR_URI:latest
      - echo "Push complete."

      # Update ECS API service with new image
      - echo "Deploying to ECS — API service..."
      - aws ecs update-service
          --cluster $ECS_CLUSTER
          --service $ECS_SERVICE_API
          --force-new-deployment
          --region $AWS_REGION

      # Update ECS Streamlit service with new image
      - echo "Deploying to ECS — Streamlit service..."
      - aws ecs update-service
          --cluster $ECS_CLUSTER
          --service $ECS_SERVICE_UI
          --force-new-deployment
          --region $AWS_REGION

      # Write imagedefinitions.json for CodePipeline (if used)
      - printf '[{"name":"%s","imageUri":"%s"}]'
          $CONTAINER_NAME $ECR_URI:$IMAGE_TAG > imagedefinitions.json

      - echo "Deployment triggered. ECS will perform a rolling update."

# ── Artifacts passed to CodePipeline ──────────────────────────────────────────
artifacts:
  files:
    - imagedefinitions.json

# ── Cache pip downloads between builds (speeds up install phase) ──────────────
cache:
  paths:
    - "/root/.cache/pip/**/*"
